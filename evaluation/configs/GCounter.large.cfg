\* Widened G-Counter for the large-scale TLC run (evaluation/large_run.sh).
\* 3 replicas, up to 13 increments each, symmetry over replicas. This is the
\* headline model: it alone explores > 1e8 distinct states (grow-only counter
\* states are cheap, so TLC reaches that depth in minutes). Invariant only;
\* the bounded CI model (MaxIncrements=2) additionally checks the Monotonic
\* temporal property.
SPECIFICATION Spec

CONSTANTS
    Replicas = {r1, r2, r3}
    MaxIncrements = 13

SYMMETRY Symm

INVARIANT TypeOK

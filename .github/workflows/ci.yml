name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Deny warnings globally so rustc (build/test) AND clippy fail on any warning.
  RUSTFLAGS: "-D warnings"
  # Pinned, reproducible TLA+ tools (latest stable as of 2026; see CLAUDE.md).
  TLA2TOOLS_VERSION: v1.7.4

jobs:
  rust:
    name: fmt / clippy / build / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Reads rust-toolchain.toml (channel `stable` + rustfmt & clippy
      # components) and enables Swatinem/rust-cache caching by default.
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  tlc:
    name: TLA+ model checking (TLC)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java (TLC requires Java 11+)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download tla2tools.jar (pinned stable)
        run: |
          curl -fLsS -o tla2tools.jar \
            "https://github.com/tlaplus/tlaplus/releases/download/${TLA2TOOLS_VERSION}/tla2tools.jar"
          # curl -f already fails on HTTP errors; just confirm the jar is
          # non-empty. (Do NOT smoke-test with `tlc2.TLC -help` — it exits
          # non-zero by design, which trips `bash -e`. The real TLC runs below
          # validate the jar.)
          test -s tla2tools.jar && echo "tla2tools.jar: $(wc -c < tla2tools.jar) bytes"

      - name: Run TLC on every spec that has a .cfg model
        run: |
          set -uo pipefail
          jar="$PWD/tla2tools.jar"
          cd tla
          shopt -s nullglob
          # Top-level specs plus the deterministic trace fixtures under traces/
          # (which reuse modules in tla/, so we run TLC from here).
          cfgs=(*.cfg traces/*.cfg)
          if [ ${#cfgs[@]} -eq 0 ]; then
            echo "No .cfg model files yet — nothing to model-check. (Specs land in Phase 1.)"
            exit 0
          fi
          status=0
          for cfg in "${cfgs[@]}"; do
            spec="${cfg%.cfg}.tla"
            if [ ! -f "$spec" ]; then
              echo "::error::$cfg has no matching $spec"; status=1; continue
            fi
            echo "::group::TLC $spec (config $cfg)"
            # TLC exits non-zero on any invariant/property violation, deadlock,
            # or parse error, which fails this step.
            java -cp "$jar" tlc2.TLC -workers auto -config "$cfg" "$spec" || status=1
            echo "::endgroup::"
          done
          exit $status

  tlaps:
    name: TLA+ proofs (TLAPS)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install TLAPS (tlapm 1.6.0-pre, Linux x86_64)
        run: |
          curl -fLsS -o tlapm.tar.gz \
            https://github.com/tlaplus/tlapm/releases/download/1.6.0-pre/tlapm-1.6.0-pre-x86_64-linux-gnu.tar.gz
          mkdir -p tlaps-bin && tar -xzf tlapm.tar.gz -C tlaps-bin
          TLAPM="$(find "$PWD/tlaps-bin" -name tlapm -type f | head -1)"
          echo "TLAPM=$TLAPM" >> "$GITHUB_ENV"
          "$TLAPM" --version

      - name: Check proofs on every tla/*Proofs.tla
        run: |
          cd tla
          shopt -s nullglob
          proofs=(*Proofs.tla)
          if [ ${#proofs[@]} -eq 0 ]; then
            echo "No *Proofs.tla yet — nothing to prove. (Proofs land from Week 2.)"
            exit 0
          fi
          status=0
          for p in "${proofs[@]}"; do
            echo "::group::tlapm $p"
            # tlapm exits non-zero if an obligation is unproved; we ALSO require
            # the explicit "All N obligations proved." line as a belt-and-braces
            # check (its exit-code semantics are less crisp than TLC's).
            "$TLAPM" "$p" 2>&1 | tee "tlapm-${p%.tla}.out"
            pstat=${PIPESTATUS[0]}
            if [ "$pstat" -ne 0 ] || ! grep -Eq 'All [0-9]+ obligations proved' "tlapm-${p%.tla}.out"; then
              echo "::error::TLAPS did not prove all obligations in $p"
              status=1
            fi
            echo "::endgroup::"
          done
          exit $status

  python:
    name: Python bindings (maturin + pytest)
    runs-on: ubuntu-latest
    # The extension build is not gated on -D warnings (the core already is).
    env:
      RUSTFLAGS: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build the extension and run pytest
        working-directory: crates/axiom-py
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -U pip maturin pytest
          ./.venv/bin/maturin develop
          ./.venv/bin/python -m pytest tests/ -q

  book:
    name: The Axiom Book (mdbook build)
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: "0.5.3"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install mdBook
        run: |
          curl -fLsS -o mdbook.tar.gz \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf mdbook.tar.gz
          echo "$PWD" >> "$GITHUB_PATH"
      - name: Build the book
        run: mdbook build docs

  metrics:
    name: Metrics drift check (README vs METRICS.md)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check headline metrics are in sync
        run: python3 scripts/check_metrics.py

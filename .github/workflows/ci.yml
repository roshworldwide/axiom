name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Deny warnings globally so rustc (build/test) AND clippy fail on any warning.
  RUSTFLAGS: "-D warnings"
  # Pinned, reproducible TLA+ tools (latest stable as of 2026; see CLAUDE.md).
  TLA2TOOLS_VERSION: v1.7.4

jobs:
  rust:
    name: fmt / clippy / build / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Reads rust-toolchain.toml (channel `stable` + rustfmt & clippy
      # components) and enables Swatinem/rust-cache caching by default.
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  tlc:
    name: TLA+ model checking (TLC)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java (TLC requires Java 11+)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download tla2tools.jar (pinned stable)
        run: |
          curl -fLsS -o tla2tools.jar \
            "https://github.com/tlaplus/tlaplus/releases/download/${TLA2TOOLS_VERSION}/tla2tools.jar"
          java -cp tla2tools.jar tlc2.TLC -help >/dev/null && echo "tla2tools OK"

      - name: Run TLC on every spec that has a .cfg model
        run: |
          set -uo pipefail
          jar="$PWD/tla2tools.jar"
          cd tla
          shopt -s nullglob
          cfgs=(*.cfg)
          if [ ${#cfgs[@]} -eq 0 ]; then
            echo "No .cfg model files yet — nothing to model-check. (Specs land in Phase 1.)"
            exit 0
          fi
          status=0
          for cfg in "${cfgs[@]}"; do
            spec="${cfg%.cfg}.tla"
            if [ ! -f "$spec" ]; then
              echo "::error::$cfg has no matching $spec"; status=1; continue
            fi
            echo "::group::TLC $spec (config $cfg)"
            # TLC exits non-zero on any invariant/property violation, deadlock,
            # or parse error, which fails this step.
            java -cp "$jar" tlc2.TLC -workers auto -config "$cfg" "$spec" || status=1
            echo "::endgroup::"
          done
          exit $status

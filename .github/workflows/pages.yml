# Build "The Axiom Book" (mdBook) and deploy it to GitHub Pages.
# Requires: Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
name: Deploy The Axiom Book to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.5.3"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mdBook
        run: |
          curl -fLsS -o mdbook.tar.gz \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf mdbook.tar.gz
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build the book
        run: mdbook build docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

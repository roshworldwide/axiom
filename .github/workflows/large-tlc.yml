# Large-scale TLC exploration — NOT part of per-commit CI (it is slow and
# resource-heavy). Runs manually (workflow_dispatch) or nightly. The committed
# evaluation/large_run.md documents the reference run on the author's machine;
# this job re-runs the same script on a GitHub runner (smaller, so it may reach
# fewer states) and uploads its report as an artifact.
name: Large-scale TLC (nightly)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC nightly

permissions:
  contents: read

jobs:
  large-tlc:
    runs-on: ubuntu-latest
    timeout-minutes: 330 # under the 6h job ceiling
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run the large-scale TLC sweep
        env:
          XMX: "13g" # ubuntu-latest has ~16 GiB
        run: |
          bash evaluation/large_run.sh | tee large_run_ci.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: large-run-report
          path: large_run_ci.md

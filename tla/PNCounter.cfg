\* TLC model for PNCounter.tla  (Axiom — Phase 1, Week 2).
\* Two 3x3 knowledge matrices (P and N) make the state space larger than the
\* G-Counter's, so we bound ops at 1 each and use symmetry on replica ids.
\* Only invariants are checked here, so symmetry reduction is sound.

SPECIFICATION Spec

CONSTANTS
    Replicas = {r1, r2, r3}
    MaxOps = 1

SYMMETRY Symm

INVARIANT TypeOK
INVARIANT NoFabrication

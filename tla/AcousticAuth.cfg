\* TLC model for AcousticAuth.tla  (Axiom — Phase 3, Week 13).
\* Both adversaries enabled: capture + REPLAY (same env) and cross-environment
\* RELAY. TLC confirms a token captured in one environment never authenticates
\* in another.

SPECIFICATION Spec

CONSTANTS
    Tokens = {tk1, tk2}
    Envs = {en1, en2}
    MaxTime = 4
    TTL = 2
    Replay = TRUE
    Relay = TRUE

INVARIANT TypeOK
INVARIANT ReplayResistance
INVARIANT RelayResistance
INVARIANT Freshness

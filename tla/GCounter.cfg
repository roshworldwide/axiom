\* TLC model for GCounter.tla  (Axiom — Phase 1, Week 2).
\* Small finite model: 3 replicas, <=2 increments each, with symmetry on
\* replica identifiers.  Uses SPECIFICATION (not INIT/NEXT) because we check a
\* temporal box-action property (Monotonic) in addition to the TypeOK invariant.

SPECIFICATION Spec

CONSTANTS
    Replicas = {r1, r2, r3}
    MaxIncrements = 2

SYMMETRY Symm

INVARIANT TypeOK
PROPERTY  Monotonic

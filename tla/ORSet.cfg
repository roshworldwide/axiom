\* TLC model for ORSet.tla  (Axiom — Phase 1, Week 3).
\* 3 replicas, 2 elements, <=1 add per replica, with symmetry on replica ids.
\* Uses SPECIFICATION because we check the temporal Monotonic property along
\* with the TypeOK and TombstonesObserved (add-wins) invariants.

SPECIFICATION Spec

CONSTANTS
    Replicas = {r1, r2, r3}
    Elements = {e1, e2}
    MaxAdds = 1

SYMMETRY Symm

INVARIANT TypeOK
INVARIANT TombstonesObserved
PROPERTY  Monotonic

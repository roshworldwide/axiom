\* TLC model for RGA.tla  (Axiom — Phase 1, Week 4).
\* Only 2 replicas with short sequences (MaxInserts=2). NO symmetry: RGA's id
\* tie-break makes replica identifiers distinguishable, so symmetry would be
\* unsound. Replicas are naturals so ids have a total order.

SPECIFICATION Spec

CONSTANTS
    Replicas = {1, 2}
    MaxInserts = 2
    Origin = h

INVARIANT TypeOK
INVARIANT Wellformed
INVARIANT LinearizationOK
INVARIANT Convergent
PROPERTY  Monotonic

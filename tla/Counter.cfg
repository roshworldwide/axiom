\* TLC model for Counter.tla  (Axiom — Phase 1, Week 1 warm-up).
\* Uses INIT/NEXT (rather than SPECIFICATION) per the build plan, so the
\* config points explicitly at Init, Next, and the invariant.

INIT Init
NEXT Next

\* Safety properties checked on every explored state.
INVARIANT TypeOK
INVARIANT NonNegative

\* Keeps the model finite (counter in 0..5) so TLC terminates.
CONSTRAINT StateConstraint
